<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ILLUMINATOR</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Yusei+Magic&family=Zen+Maru+Gothic:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Kosugi+Maru&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme--hiver mode--sombre" data-font="inter">
  <div class="bg-orbs" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar__left">
      <button id="btnLeft" class="icon-btn" type="button" aria-label="Ouvrir panneau gauche">≡</button>
    </div>

    <div class="topbar__center">
      <div class="top-actions">
        <button id="modeToggle" class="top-btn" type="button">Clair</button>
        <button id="seasonCycle" class="top-btn" type="button">Hiver</button>
        <button id="focusBtn" class="top-btn" type="button">Focus</button>
      </div>
    </div>

    <div class="topbar__right">
      <button id="btnRight" class="icon-btn" type="button" aria-label="Ouvrir panneau droit">⋮</button>
    </div>
  </header>

  <div id="panelBack" class="panel-back" hidden></div>

  <!-- PANNEAU GAUCHE -->
  <aside id="leftPanel" class="panel panel--left" hidden aria-label="Panneau gauche">
    <div class="panel__head">
      <div class="panel__title">Menu</div>
      <button id="leftClose" class="icon-btn" type="button" aria-label="Fermer panneau gauche">×</button>
    </div>

    <nav class="tabs" aria-label="Onglets panneau gauche">
      <button class="tab-btn is-active" data-lefttab="inbox" type="button">Inbox</button>
      <button class="tab-btn" data-lefttab="projects" type="button">Projets</button>
      <button class="tab-btn" data-lefttab="tasks" type="button">Tâches</button>
      <button class="tab-btn" data-lefttab="prefs" type="button">Préférences</button>
    </nav>

    <div class="panel__body">
      <section id="left-inbox" class="tab-page is-show">
        <p class="helper">
          Une ligne = une tâche. Format rapide :
          <br><span class="mono">Introduction article - 30</span>
        </p>

        <textarea id="inboxText" class="field textarea" rows="10" placeholder="Introduction article - 30&#10;Plan carnet de stage - 20&#10;Rythme batterie - 10"></textarea>

        <div class="row">
          <button id="inboxAdd" class="action-btn action-btn--accent" type="button">Ajouter</button>
          <button id="inboxClear" class="action-btn" type="button">Effacer</button>
        </div>
      </section>

      <section id="left-projects" class="tab-page">
        <div id="projectList" class="stack"></div>

        <div class="soft-sep"></div>

        <div class="field-group">
          <label class="label-mini" for="newProjectName">Nouveau projet</label>
          <input id="newProjectName" class="field input" type="text" placeholder="Nom du projet">
        </div>

        <div class="row">
          <input id="newProjectColor" class="field input color-input" type="color" value="#8dbcf0">
          <button id="addProjectBtn" class="action-btn action-btn--accent" type="button">Créer</button>
        </div>
      </section>

      <section id="left-tasks" class="tab-page">
        <div id="taskList" class="stack"></div>
      </section>

      <section id="left-prefs" class="tab-page">
        <div class="grid-2">
          <div class="field-group">
            <label class="label-mini" for="fontSel">Police</label>
            <select id="fontSel" class="field select">
              <option value="inter">Inter</option>
              <option value="yusei">Yusei Magic</option>
              <option value="zen">Zen Maru Gothic</option>
              <option value="mplus">M PLUS Rounded</option>
              <option value="kosugi">Kosugi Maru</option>
            </select>
          </div>

          <div class="field-group">
            <label class="label-mini" for="uiScale">Taille</label>
            <input id="uiScale" class="field range" type="range" min="14" max="18" step="1">
          </div>
        </div>

        <div class="row">
          <button id="resetAppBtn" class="action-btn action-btn--danger" type="button">Reset</button>
        </div>
      </section>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="app-shell">
    <div class="app-shell__inner">
      <h1 class="app-title">ILLUMINATOR</h1>
      <p class="subtitle">Voir l’avancement. Réduire la friction.</p>

      <section class="progress-shell">
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div id="dayProgressFill" class="progress-fill"></div>
          <div id="dayProgressText" class="progress-pct">0%</div>
        </div>
      </section>

      <section class="mission-card">
        <div id="statusSpot" class="status-spot">Prêt.</div>

        <div class="dashboard-grid">
          <section class="project-towers-wrap">
            <div id="projectTowers" class="project-towers"></div>
          </section>

          <section class="current-focus">
            <div class="panel-title">Maintenant</div>
            <div id="taskTitle" class="task-title">Aucune tâche</div>
            <div id="taskMeta" class="task-meta">—</div>

            <div class="center-actions">
              <button id="startBtn" class="side-btn" type="button" title="Commencer">▶</button>

              <button id="rouletteBtn" class="roulette-btn" type="button" aria-label="Choix">
                <div id="rouletteWheel" class="roulette-wheel">
                  <span class="roulette-wheel__txt">Choisir</span>
                </div>
              </button>

              <button id="shrinkBtn" class="side-btn side-btn--accent" type="button" title="Réduire">–</button>
            </div>

            <div class="quick-links">
              <button id="doneTaskBtn" class="quick-link" type="button">Terminer</button>
              <button id="nextTaskBtn" class="quick-link" type="button">Changer</button>
              <button id="editTaskBtn" class="quick-link" type="button">Éditer</button>
            </div>
          </section>
        </div>

        <section class="timeline-shell">
          <div class="panel-title">Jour</div>
          <div id="dayTimeline" class="mini-timeline"></div>
        </section>

        <section class="micro-inline">
          <span id="pillTasks">0 tâches</span>
          <span id="pillDone">0 faites</span>
          <span id="pillFocus">focus normal</span>
        </section>
      </section>
    </div>
  </main>

  <!-- PANNEAU DROIT -->
  <aside id="rightPanel" class="panel panel--right" hidden aria-label="Panneau droit">
    <div class="panel__head">
      <div class="panel__title">Panneau</div>
      <button id="rightClose" class="icon-btn" type="button" aria-label="Fermer panneau droit">×</button>
    </div>

    <nav class="tabs" aria-label="Onglets panneau droit">
      <button class="tab-btn is-active" data-righttab="day" type="button">Jour</button>
      <button class="tab-btn" data-righttab="week" type="button">Semaine</button>
      <button class="tab-btn" data-righttab="month" type="button">Mois</button>
      <button class="tab-btn" data-righttab="kiff" type="button">Kiffance</button>
      <button class="tab-btn" data-righttab="notes" type="button">Notes</button>
    </nav>

    <div class="panel__body">
      <section id="right-day" class="tab-page is-show">
        <div id="daySummary" class="stack"></div>
      </section>

      <section id="right-week" class="tab-page">
        <div id="weekBars" class="stack"></div>
      </section>

      <section id="right-month" class="tab-page">
        <div id="monthGrid" class="calendar-grid month-grid"></div>
      </section>

      <section id="right-kiff" class="tab-page">
        <div class="grid-2">
          <button class="action-btn kiff-btn" data-kiff="1" type="button">1 min</button>
          <button class="action-btn kiff-btn" data-kiff="5" type="button">5 min</button>
          <button class="action-btn kiff-btn" data-kiff="30" type="button">30 min</button>
          <button class="action-btn kiff-btn" data-kiff="60" type="button">60 min</button>
        </div>

        <div class="soft-sep"></div>

        <div id="kiffSuggestion" class="surprise-card">Choisir une durée.</div>
      </section>

      <section id="right-notes" class="tab-page">
        <div class="field-group">
          <label class="label-mini" for="notesArea">Notes</label>
          <textarea id="notesArea" class="field textarea" rows="10"></textarea>
        </div>
      </section>
    </div>
  </aside>

  <!-- MODAL ÉDITION -->
  <div id="modalBack" class="modal-back" hidden></div>

  <div id="editModal" class="glass-wrap" hidden role="dialog" aria-modal="true" aria-label="Éditer">
    <div class="glass-modal glass-modal--small">
      <div class="glass-modal__head">
        <div class="panel-title">Édition</div>
        <button id="modalClose" class="icon-btn" type="button" aria-label="Fermer">×</button>
      </div>

      <div class="glass-modal__body">
        <div class="field-group">
          <label class="label-mini" for="editTaskName">Nom</label>
          <input id="editTaskName" class="field input" type="text">
        </div>

        <div class="grid-2">
          <div class="field-group">
            <label class="label-mini" for="editTaskMinutes">Durée</label>
            <input id="editTaskMinutes" class="field input" type="number" min="1" max="240">
          </div>

          <div class="field-group">
            <label class="label-mini" for="editTaskDifficulty">Effort</label>
            <select id="editTaskDifficulty" class="field select">
              <option value="easy">facile</option>
              <option value="medium">moyen</option>
              <option value="hard">lourd</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label class="label-mini" for="editTaskProject">Projet</label>
          <select id="editTaskProject" class="field select"></select>
        </div>

        <div class="row">
          <button id="saveEditBtn" class="action-btn action-btn--accent" type="button">Sauver</button>
          <button id="deleteTaskBtn" class="action-btn action-btn--danger" type="button">Supprimer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
